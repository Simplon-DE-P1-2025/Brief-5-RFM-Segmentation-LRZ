  - missing_count(price) = 0
  - missing_percent(customer_id) < 25          # ≈ 22,77 % (cf. audit)
  - missing_percent(description) < 1           # ≈ 0,41 %
  - duplicate_count(*) < 50000                 # ≈ 32 907 (cf. audit)
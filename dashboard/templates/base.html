<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RFM Dashboard{% endblock %}</title>

  <!-- Bootstrap 5 (CDN — démo locale ; switch vers vendored si offline) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS custom -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">

  {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      RFM <span class="text-warning">Dashboard</span>
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'overview' %}active fw-semibold{% endif %}" href="/">Overview</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'recency' %}active fw-semibold{% endif %}" href="/recency">Recency</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'frequency' %}active fw-semibold{% endif %}" href="/frequency">Frequency</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'monetary' %}active fw-semibold{% endif %}" href="/monetary">Monetary</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'movements' %}active fw-semibold{% endif %}" href="/movements">Movements</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'cohorts' %}active fw-semibold{% endif %}" href="/cohorts">Cohorts</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'about' %}active fw-semibold{% endif %}" href="/about">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'glossary' %}active fw-semibold{% endif %}" href="/glossary">Glossary</a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="/presentation">Présentation</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
{% endblock %}

{% block content %}{% endblock %}

<!-- Plotly.js — vendored (cf. dashboard/static/js/plotly.min.js) -->
<script src="{{ url_for('static', filename='js/plotly.min.js') }}"></script>

<!-- Bootstrap JS (CDN) — pour le navbar collapse responsive -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
